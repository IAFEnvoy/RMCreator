<div class="submenu-settings-card">
  <div class="menu-group-title">连续操作</div>
  <div class="submenu-settings-row">
    <span>连续选择</span>
    <label class="toggle-switch" for="continuousSelectModeToggle">
      <input id="continuousSelectModeToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <div class="submenu-settings-row">
    <span>连续车站放置</span>
    <label class="toggle-switch" for="continuousStationModeToggle">
      <input id="continuousStationModeToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <div class="submenu-settings-row">
    <span>连续画线</span>
    <label class="toggle-switch" for="continuousLineModeToggle">
      <input id="continuousLineModeToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <div class="submenu-settings-row">
    <span>连续放置文本</span>
    <label class="toggle-switch" for="continuousTextModeToggle">
      <input id="continuousTextModeToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <div class="submenu-settings-row">
    <span>连续放置图形</span>
    <label class="toggle-switch" for="continuousShapeModeToggle">
      <input id="continuousShapeModeToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>

  <div class="menu-group-title">显示</div>
  <div class="submenu-settings-row">
    <span>显示网格</span>
    <label class="toggle-switch" for="showGridToggle">
      <input id="showGridToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <label class="submenu-settings-row">
    <span>选择框颜色</span>
    <button id="selectionGlowColor" class="color-modal-trigger" type="button" data-color-role="app-selection-glow">
      <span class="color-modal-swatch"></span>
      <span class="color-modal-text">#2F6DE5FF</span>
    </button>
  </label>
  <label class="submenu-settings-row">
    <span>主题色</span>
    <button id="themeAccentColor" class="color-modal-trigger" type="button" data-color-role="app-theme-accent">
      <span class="color-modal-swatch"></span>
      <span class="color-modal-text">#2F6DE5FF</span>
    </button>
  </label>
  <label class="submenu-settings-row submenu-settings-row-column">
    <span>发光范围</span>
    <input id="selectionGlowSize" type="number" min="1" max="30" step="1" />
  </label>
  <label class="submenu-settings-row submenu-settings-row-column">
    <span>等距对齐线距离</span>
    <input id="snapEqualSpacingOffset" type="number" min="4" max="80" step="1" />
  </label>

  <div class="menu-group-title">自动对齐</div>
  <div class="submenu-settings-row">
    <span>直接重合</span>
    <label class="toggle-switch" for="snapOverlapToggle">
      <input id="snapOverlapToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <div class="submenu-settings-row">
    <span>同一行/列/对角线</span>
    <label class="toggle-switch" for="snapAxisDiagonalToggle">
      <input id="snapAxisDiagonalToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <div class="submenu-settings-row">
    <span>等距对齐</span>
    <label class="toggle-switch" for="snapEqualSpacingToggle">
      <input id="snapEqualSpacingToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>
  <div class="submenu-settings-row">
    <span>格点（自动对齐）</span>
    <label class="toggle-switch" for="snapGridToggle">
      <input id="snapGridToggle" class="toggle-checkbox" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
  </div>

  <div class="menu-group-title">杂项</div>
  <label class="submenu-settings-row submenu-settings-row-column">
    <span>默认线条几何类型</span>
    <select id="defaultLineGeometrySelect"></select>
  </label>
</div>
