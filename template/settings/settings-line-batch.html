{{summaryHtml}}
<div class="kv">组件类型: 线（批量设置）</div>
<div class="field">
  <label for="batchLineTypeSelect">线条类型</label>
  <select id="batchLineTypeSelect">{{lineTypeOptions}}</select>
</div>
<div class="field">
  <label for="batchLineGeometrySelect">几何类型</label>
  <select id="batchLineGeometrySelect">{{geometryOptions}}</select>
</div>
<div class="field">
  <label for="batchLineFlipSelect">翻转形状</label>
  <select id="batchLineFlipSelect">{{flipOptions}}</select>
</div>
<div class="field">
  <label for="batchLineFlipColorSelect">翻转颜色</label>
  <select id="batchLineFlipColorSelect">{{flipColorOptions}}</select>
</div>
<div class="field">
  <label for="batchLineCornerRadius">转弯圆弧半径</label>
  <input id="batchLineCornerRadius" type="number" min="0" max="120" step="1" value="{{commonCorner}}"
    placeholder="保持当前（混合）" />
</div>
<div class="field">
  <label for="batchLineStartOffset">起点偏移量</label>
  <input id="batchLineStartOffset" type="number" min="-120" max="120" step="1" value="{{commonStartOffset}}"
    placeholder="保持当前（混合）" />
</div>
<div class="field">
  <label for="batchLineEndOffset">终点偏移量</label>
  <input id="batchLineEndOffset" type="number" min="-120" max="120" step="1" value="{{commonEndOffset}}"
    placeholder="保持当前（混合）" />
</div>
<div class="kv">提示：批量模式下暂不支持颜色列表编辑。</div>
