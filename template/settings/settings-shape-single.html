{{summaryHtml}}
<div class="kv">组件类型: 图形</div>
<div class="kv">预制图形: {{presetName}}</div>
<div class="field">
  <label for="shapeScaleInput">缩放比例</label>
  <input id="shapeScaleInput" type="number" min="0.1" max="10" step="0.1" value="{{safeScale}}" />
</div>
<div class="field">
  <label for="shapeRotationInput">旋转角度</label>
  <input id="shapeRotationInput" type="number" min="-360" max="360" step="1" value="{{safeRotation}}" />
</div>
<div class="field">
  <label>参数预览</label>
  <img class="menu-item-shape-preview" alt="图形预览" src="{{shapePreviewSrc}}" />
</div>
{{paramFieldsHtml}}
