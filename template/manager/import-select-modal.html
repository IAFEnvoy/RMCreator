<div class="line-manager-modal import-select-modal" role="dialog" aria-modal="true" aria-label="导入选择">
  <div class="modal-head">
    <h2>选择要导入的{{title}}</h2>
    <button class="btn-ghost" id="close{{Type}}ImportSelectBtn" type="button" aria-label="关闭">
      <img src="/img/icon-close.svg" alt="关闭" />
    </button>
  </div>
  <div class="modal-body import-select-body">
    <section class="line-library import-select-panel">
      <div class="line-library-head">
        <label class="manager-select-all" for="{{type}}ImportSelectAll">
          <input id="{{type}}ImportSelectAll" class="library-select-all-checkbox" type="checkbox" />
          <span>全选</span>
        </label>
        <span class="line-library-name">导入列表</span>
      </div>
      <div class="manager-library-toolbar">
        <div class="import-select-actions">
          <button class="btn-ghost" id="cancel{{Type}}ImportSelectBtn" type="button">取消</button>
          <button class="btn-main" id="confirm{{Type}}ImportSelectBtn" type="button">导入所选</button>
        </div>
      </div>
      <div id="{{type}}ImportSelectList" class="line-library-list import-select-list"></div>
    </section>
  </div>
</div>
