<div class="line-manager-modal shortcuts-modal" role="dialog" aria-modal="true" aria-label="快捷键">
  <div class="modal-head">
    <h2>快捷键</h2>
    <button class="btn-ghost" id="closeShortcutsBtn" type="button" aria-label="关闭">
      <img src="/img/icon-close.svg" alt="关闭" />
    </button>
  </div>
  <div class="shortcuts-body">
    <div class="shortcuts-row">
      <div class="shortcuts-keys">
        <img class="key-icon" src="/img/key/icon-up.svg" alt="上" />
        <img class="key-icon" src="/img/key/icon-down.svg" alt="下" />
        <img class="key-icon" src="/img/key/icon-left.svg" alt="左" />
        <img class="key-icon" src="/img/key/icon-right.svg" alt="右" />
      </div>
      <div class="shortcuts-desc">移动画布</div>
    </div>
    <div class="shortcuts-row">
      <div class="shortcuts-keys">
        <img class="key-icon" src="/img/key/icon-shift.svg" alt="Shift" />
      </div>
      <div class="shortcuts-desc">多选，加快移动画布</div>
    </div>
    <div class="shortcuts-row">
      <div class="shortcuts-keys">
        <img class="key-icon" src="/img/key/icon-alt.svg" alt="Alt" />
      </div>
      <div class="shortcuts-desc">暂时关闭磁吸</div>
    </div>
    <div class="shortcuts-row">
      <div class="shortcuts-keys">
        <img class="key-icon" src="/img/key/icon-ctrl.svg" alt="Ctrl" />
      </div>
      <div class="shortcuts-desc">将拖动的车站吸附到现有线段上</div>
    </div>
  </div>
</div>
