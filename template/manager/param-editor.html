<div class="line-manager-modal param-editor-modal" role="dialog" aria-modal="true" aria-label="参数编辑器">
  <div class="modal-head">
    <h2 id="paramEditorTitle">参数编辑器</h2>
    <button class="btn-ghost" id="closeParamEditorBtn" type="button" aria-label="关闭">
      <img src="/img/icon-close.svg" alt="关闭" />
    </button>
  </div>
  <div class="param-editor-body"></div>
  <div class="modal-actions param-editor-actions">
    <div class="left-actions">
      <button class="btn-ghost" id="paramEditorApplyAllBtn" type="button">应用（不关闭）</button>
    </div>
    <div>
      <button class="btn-ghost" id="paramEditorCancelBtn" type="button">取消</button>
      <button class="btn-main" id="paramEditorApplyBtn" type="button">确定</button>
    </div>
  </div>
</div>
