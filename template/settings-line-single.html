{{summaryHtml}}
<div class="kv">组件类型: 线</div>
<div class="line-layer-title">排列</div>
<div class="line-layer-actions" role="group" aria-label="线条层级">
  <button class="line-layer-action" type="button" data-line-layer-action="to-front" title="置顶" aria-label="置顶">
    <img src="/img/layer/icon-layer-bring-to-front.svg" alt="" />
  </button>
  <button class="line-layer-action" type="button" data-line-layer-action="to-back" title="置底" aria-label="置底">
    <img src="/img/layer/icon-layer-send-to-back.svg" alt="" />
  </button>
  <button class="line-layer-action" type="button" data-line-layer-action="up" title="上移" aria-label="上移">
    <img src="/img/layer/icon-layer-bring-forward.svg" alt="" />
  </button>
  <button class="line-layer-action" type="button" data-line-layer-action="down" title="下移" aria-label="下移">
    <img src="/img/layer/icon-layer-send-backward.svg" alt="" />
  </button>
  <button class="line-layer-action" type="button" data-line-layer-action="move-under" data-line-layer-mode="below"
    title="移到指定对象下面" aria-label="移到指定对象下面">
    <img src="/img/layer/icon-layer-down-to.svg" alt="" />
  </button>
  <button class="line-layer-action" type="button" data-line-layer-action="move-over" data-line-layer-mode="above"
    title="移到指定对象上面" aria-label="移到指定对象上面">
    <img src="/img/layer/icon-layer-up-to.svg" alt="" />
  </button>
</div>
<div class="field">
  <label for="lineTypeSelect">线条类型</label>
  <select id="lineTypeSelect">{{lineTypeOptions}}</select>
</div>
<div class="field">
  <label for="lineGeometrySelect">几何类型</label>
  <select id="lineGeometrySelect">{{geometryOptions}}</select>
</div>
<div class="field field-toggle">
  <label for="lineFlip">翻转形状</label>
  <label class="toggle-switch" for="lineFlip">
    <input id="lineFlip" class="toggle-checkbox" type="checkbox" {{lineFlipChecked}} />
    <span class="toggle-slider" aria-hidden="true"></span>
  </label>
</div>
<div class="field field-toggle">
  <label for="lineFlipColor">翻转颜色</label>
  <label class="toggle-switch" for="lineFlipColor">
    <input id="lineFlipColor" class="toggle-checkbox" type="checkbox" {{lineFlipColorChecked}} />
    <span class="toggle-slider" aria-hidden="true"></span>
  </label>
</div>
<div class="field">
  <label for="lineCornerRadius">转弯圆弧半径</label>
  <input id="lineCornerRadius" type="number" min="0" max="120" step="1" value="{{lineCornerRadius}}" />
</div>
<div class="field">
  <label for="lineStartOffset">起点偏移量</label>
  <input id="lineStartOffset" type="number" min="-120" max="120" step="1" value="{{lineStartOffset}}" />
</div>
<div class="field">
  <label for="lineEndOffset">终点偏移量</label>
  <input id="lineEndOffset" type="number" min="-120" max="120" step="1" value="{{lineEndOffset}}" />
</div>
<div class="field">
  <label>颜色列表</label>
  <div class="line-settings-color-list">{{colorListEditorHtml}}</div>
</div>
